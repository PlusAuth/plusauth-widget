    <style id="dev-style">
        :root {
            --pa-font-family: Tahoma, Verdana, sans-serif;
            --pa-fs-p: 16px;
            --pa-fs-h1: 22px;
            --pa-fs-h2: 14px;
            --pa-fw-p: 400;
            --pa-fw-h1: 500;
            --pa-fw-h2: 400;
            --pa-align-p: start;
            --pa-align-h1: center;
            --pa-align-h2: center;
            --pa-input-radius: 12px;
            --pa-input-border-w: 1px;
            --pa-main-radius: 8px;
            --pa-main-border-w: 1px;
            --pa-main-border-c: #e2e8f0;
            --pa-main-bg: #ffffff;
            --pa-widget-align: center;
            --pa-logo-align: center;
        }
        html, body {
            margin: 0;
            height: 100%;
        }
        .dev-navbar {
            position: absolute;
            left: 0;
            display: flex;
            font-family: sans-serif;
            flex-direction: column;
            z-index: 123213;
        }
        .dev-navbar a {
            display: inline-flex;
            color: inherit;
            text-decoration: inherit;
            padding: 10px;
            text-align: center;
            border: 1px solid #dedede;
            text-decoration: none;
        }
        #pa__app {
            height: 100%;
        }
        .mode-selector-container {
            position: absolute;
            top: 10px;
            right: 10px;
            display: flex;
            gap: 10px;
            z-index: 123214;
            font-family: sans-serif;
            background: rgba(255, 255, 255, 0.8);
            padding: 8px;
            border-radius: 8px;
            border: 1px solid #ccc;
        }
        .mode-selector-container label {
            display: flex;
            align-items: center;
            gap: 4px;
            cursor: pointer;
            font-size: 14px;
        }
        @media (max-width: 1200px) {
            .dev-navbar {
                display: none;
            }
        }
    </style>
</head>
